<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>jQuery Page Manipulation Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Poppins', sans-serif;
    max-width: 600px;
    margin: 60px auto;
    padding: 0 20px;
    text-align: center;
    background: #ffe4f1;
    color: #7a2248;
    transition: background 0.4s ease, color 0.4s ease;
  }
  h1 {
    color: #d6336c;
  }
  p#message {
    font-size: 18px;
    line-height: 1.5;
  }
  button {
    margin: 10px;
    padding: 10px 20px;
    font-size: 15px;
    font-family: 'Poppins', sans-serif;
    border: none;
    border-radius: 20px;
    background: #ff6fa5;
    color: white;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  button:hover {
    background: #e85590;
  }
  .dark-mode {
    background: #3d1a2e;
    color: #ffd6e8;
  }
  .dark-mode h1 {
    color: #ff9ecb;
  }
  .highlight {
    color: #c2185b;
    font-weight: 700;
  }
</style>
</head>
<body>

  <h1>Welcome to the jQuery Demo Page</h1>
  <p id="message">Click a button below to see something happen. This paragraph will change when you click "Change Text", and the whole page will switch look when you click "Toggle Dark Mode".</p>

  <button id="changeTextBtn">Change Text</button>
  <button id="toggleThemeBtn">Toggle Dark Mode</button>

  <script>
    $(document).ready(function () {
      // Button 1: change the paragraph text and style each time it's clicked
      let clickCount = 0;
      const messages = [
        "You changed the text using jQuery! Nice work.",
        "jQuery makes DOM manipulation easy and fun.",
        "Every click updates this paragraph dynamically.",
        "Back to a fresh message — keep clicking!"
      ];

      $('#changeTextBtn').on('click', function () {
        clickCount = (clickCount + 1) % messages.length;
        $('#message')
          .fadeOut(200, function () {
            $(this).text(messages[clickCount]).fadeIn(200);
          })
          .toggleClass('highlight');
      });

      // Button 2: toggle a dark mode theme on the whole page
      $('#toggleThemeBtn').on('click', function () {
        $('body').toggleClass('dark-mode');
        $(this).text($('body').hasClass('dark-mode') ? 'Toggle Light Mode' : 'Toggle Dark Mode');
      });
    });
  </script>

</body>
</html>
