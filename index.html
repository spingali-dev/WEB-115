<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Person Form Assignment</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Person Information Form</h1>

  <form id="personForm">
    <div class="form-row">
      <label for="firstName">First Name:</label>
      <input type="text" id="firstName" name="firstName">
    </div>

    <div class="form-row">
      <label for="lastName">Last Name:</label>
      <input type="text" id="lastName" name="lastName">
    </div>

    <div class="form-row">
      <label for="course">Course:</label>
      <input type="text" id="course" name="course">
    </div>

    <div class="form-row">
      <label for="section">Section Number:</label>
      <input type="text" id="section" name="section">
    </div>

    <div class="form-row">
      <label for="role">Role:</label>
      <input type="text" id="role" name="role" placeholder="instructor or student">
    </div>

    <div class="form-row">
      <button type="button" id="submitBtn">Submit</button>
    </div>
  </form>

  <p class="note">Open your browser's console (F12) to view the output.</p>

  <script src="script.js"></script>
</body>
</html>
